basePath: /api
definitions:
  data.JSON:
    additionalProperties: {}
    type: object
  dsl.Filter:
    properties:
      column:
        example: input
        type: string
      operator:
        allOf:
        - $ref: '#/definitions/dsl.Operator'
        example: =
      value:
        example: xyz
        type: string
    type: object
  dsl.FilterGroup:
    properties:
      filters:
        items:
          $ref: '#/definitions/dsl.Filter'
        type: array
      group_logic:
        description: '"AND" or "OR"'
        example: AND
        type: string
    type: object
  dsl.Operator:
    enum:
    - =
    - like
    - '!='
    - '>'
    - <
    type: string
    x-enum-varnames:
    - Equal
    - Like
    - NotEqual
    - GreaterThan
    - LessThan
  dsl.StateQuery:
    properties:
      data_columns:
        description: |-
          UserID       string        `json:"user_id" example:"77c17315-3013-5bb8-8c42-32c28618101f"`
          StateID      string        `json:"state_id" example:"465884e9-7a08-40d0-acff-148663a7c9cf"`
        items:
          type: string
        type: array
      filter_groups:
        items:
          $ref: '#/definitions/dsl.FilterGroup'
        type: array
    type: object
  dsl.StateQueryResult:
    properties:
      column_name:
        type: string
      data_index:
        type: integer
      data_value:
        type: string
    type: object
  embedding.ContentType:
    enum:
    - text
    - markdown
    - code
    - json
    type: string
    x-enum-varnames:
    - ContentText
    - ContentMarkdown
    - ContentCode
    - ContentJSON
  embedding.Document:
    properties:
      content:
        type: string
      content_type:
        $ref: '#/definitions/embedding.ContentType'
      created_at:
        type: string
      dimensions:
        type: integer
      embedding:
        items:
          type: number
        type: array
      id:
        type: string
      metadata:
        $ref: '#/definitions/data.JSON'
      model:
        type: string
      parent_id:
        type: string
      project_id:
        type: string
      scope_id:
        type: string
      scope_type:
        $ref: '#/definitions/embedding.ScopeType'
      session_id:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  embedding.ScopeType:
    enum:
    - state
    - route
    - processor
    - document
    - conversation
    - tool_result
    type: string
    x-enum-varnames:
    - ScopeState
    - ScopeRoute
    - ScopeProcessor
    - ScopeDocument
    - ScopeConversation
    - ScopeToolResult
  embedding.SearchResult:
    properties:
      document:
        $ref: '#/definitions/embedding.Document'
      similarity:
        type: number
    type: object
  model.ErrorResponse:
    properties:
      code:
        type: integer
      message:
        type: string
    type: object
  v1.SearchFilterRequest:
    properties:
      project_id:
        type: string
      scope_id:
        type: string
      scope_type:
        $ref: '#/definitions/embedding.ScopeType'
      session_id:
        type: string
      user_id:
        type: string
    required:
    - user_id
    type: object
  v1.SearchOptionsRequest:
    properties:
      limit:
        type: integer
      min_similarity:
        type: number
    type: object
  v1.SearchRequest:
    properties:
      embedding:
        items:
          type: number
        type: array
      filter:
        $ref: '#/definitions/v1.SearchFilterRequest'
      options:
        $ref: '#/definitions/v1.SearchOptionsRequest'
    required:
    - embedding
    - filter
    type: object
host: localhost:8081
info:
  contact: {}
  description: 'This is a query api for Alethic ISM using a storage class: database'
  license:
    name: Quantum Wake OU - Copyright 2024
  termsOfService: http://swagger.io/terms/
  title: Alethic ISM - Data Query API
  version: "1.0"
paths:
  /v1/nlp/embeddings:
    post:
      consumes:
      - application/json
      description: Insert or update a single embedding document
      parameters:
      - description: Embedding document
        in: body
        name: document
        required: true
        schema:
          $ref: '#/definitions/embedding.Document'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/embedding.Document'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Upsert an embedding document
      tags:
      - Embedding
  /v1/nlp/embeddings/{id}:
    delete:
      description: Delete a single embedding document by its ID
      parameters:
      - description: Document ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Delete embedding document by ID
      tags:
      - Embedding
    get:
      description: Retrieve a single embedding document by its ID
      parameters:
      - description: Document ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/embedding.Document'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Find embedding document by ID
      tags:
      - Embedding
  /v1/nlp/embeddings/batch:
    post:
      consumes:
      - application/json
      description: Insert or update multiple embedding documents in a single transaction
      parameters:
      - description: List of embedding documents
        in: body
        name: documents
        required: true
        schema:
          items:
            $ref: '#/definitions/embedding.Document'
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: integer
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Batch upsert embedding documents
      tags:
      - Embedding
  /v1/nlp/embeddings/migrate:
    post:
      description: Create the embedding_document table and indexes if they do not
        exist
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Run embedding table migration
      tags:
      - Embedding
  /v1/nlp/embeddings/parent/{id}:
    delete:
      description: Delete all embedding documents with the given parent ID
      parameters:
      - description: Parent ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Delete embedding documents by parent ID
      tags:
      - Embedding
    get:
      description: Retrieve all embedding documents with the given parent ID
      parameters:
      - description: Parent ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/embedding.Document'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Find embedding documents by parent ID
      tags:
      - Embedding
  /v1/nlp/embeddings/search:
    post:
      consumes:
      - application/json
      description: Search for similar documents using cosine similarity
      parameters:
      - description: Search parameters
        in: body
        name: search
        required: true
        schema:
          $ref: '#/definitions/v1.SearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/embedding.SearchResult'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Search embedding documents by similarity
      tags:
      - Embedding
  /v1/state/query/{id}:
    post:
      consumes:
      - application/json
      description: Query state data with filters
      parameters:
      - description: State ID
        in: path
        name: id
        required: true
        type: string
      - description: the query groups and filters
        in: body
        name: dsl.StateQuery
        required: true
        schema:
          $ref: '#/definitions/dsl.StateQuery'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dsl.StateQueryResult'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Query state data
      tags:
      - State
swagger: "2.0"
